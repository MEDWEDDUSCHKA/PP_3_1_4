<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>User Form</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" 
          rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" 
          rel="stylesheet">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">
                <i class="bi bi-people-fill"></i> User Management
            </a>
            
            <button class="navbar-toggler" type="button" 
                    data-bs-toggle="collapse" data-bs-target="#navbarNav"
                    aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <!-- User info -->
                    <li class="navbar-text text-white me-3">
                        <i class="bi bi-person-circle"></i>
                        <span sec:authentication="name">Username</span>
                    </li>
                    
                    <!-- Admin link (only for ADMIN role) -->
                    <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                        <a class="nav-link active" href="/admin">
                            <i class="bi bi-shield-lock"></i> Admin Panel
                        </a>
                    </li>
                    
                    <!-- User link -->
                    <li class="nav-item" sec:authorize="hasAnyRole('USER', 'ADMIN')">
                        <a class="nav-link" href="/user">
                            <i class="bi bi-person"></i> My Profile
                        </a>
                    </li>
                    
                    <!-- Logout -->
                    <li class="nav-item">
                        <form th:action="@{/logout}" method="post" class="d-inline">
                            <button type="submit" class="btn btn-outline-light btn-sm ms-2">
                                <i class="bi bi-box-arrow-right"></i> Logout
                            </button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- User Form -->
    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        <h3 class="mb-0">
                            <i th:class="${user.id != null ? 'bi bi-pencil-square' : 'bi bi-person-plus'}"></i>
                            <span th:text="${user.id != null ? 'Edit User' : 'Add New User'}"></span>
                        </h3>
                    </div>
                    <div class="card-body">
                        <form th:action="${user.id != null ? '/admin/update' : '/admin'}" 
                              th:object="${user}" method="post">
                            
                            <input type="hidden" th:field="*{id}" />
                            
                            <div class="mb-3">
                                <label for="username" class="form-label">Username *</label>
                                <input type="text" class="form-control" 
                                       id="username" th:field="*{username}" 
                                       placeholder="Enter username" required>
                            </div>
                            
                            <div class="mb-3">
                                <label for="password" class="form-label">
                                    Password <span th:if="${user.id == null}">*</span>
                                </label>
                                <input type="password" class="form-control" 
                                       id="password" th:field="*{password}"
                                       placeholder="Enter password"
                                       th:required="${user.id == null}">
                                <div th:if="${user.id != null}" class="form-text">
                                    <i class="bi bi-info-circle"></i>
                                    Leave blank to keep current password
                                </div>
                            </div>
                            
                            <div class="mb-3">
                                <label for="firstName" class="form-label">First Name</label>
                                <input type="text" class="form-control" 
                                       id="firstName" th:field="*{firstName}"
                                       placeholder="Enter first name">
                            </div>
                            
                            <div class="mb-3">
                                <label for="lastName" class="form-label">Last Name</label>
                                <input type="text" class="form-control" 
                                       id="lastName" th:field="*{lastName}"
                                       placeholder="Enter last name">
                            </div>
                            
                            <div class="mb-3">
                                <label for="email" class="form-label">Email</label>
                                <input type="email" class="form-control" 
                                       id="email" th:field="*{email}"
                                       placeholder="Enter email address">
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label">Roles</label>
                                <div th:each="role : ${allRoles}">
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" 
                                               name="roleIds" th:value="${role.id}"
                                               th:id="'role' + ${role.id}"
                                               th:checked="${user.roles != null && user.roles.contains(role)}">
                                        <label class="form-check-label" 
                                               th:for="'role' + ${role.id}"
                                               th:text="${role.name}"></label>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                                <a href="/admin" class="btn btn-secondary">
                                    <i class="bi bi-x-circle"></i> Cancel
                                </a>
                                <button type="submit" class="btn btn-success">
                                    <i class="bi bi-check-circle"></i> Save
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Bootstrap JS Bundle (includes Popper) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

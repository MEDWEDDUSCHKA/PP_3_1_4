<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin panel</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" 
          rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
        }
        .top-navbar {
            background-color: #343a40;
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .sidebar {
            position: fixed;
            top: 56px;
            left: 0;
            bottom: 0;
            width: 180px;
            background-color: #fff;
            padding-top: 0;
        }
        .sidebar .nav-link {
            color: #333;
            padding: 12px 20px;
            border-radius: 0;
            display: block;
            text-decoration: none;
        }
        .sidebar .nav-link.active {
            background-color: #007bff;
            color: white;
        }
        .main-content {
            margin-left: 180px;
            margin-top: 56px;
            padding: 30px;
            background-color: #f8f9fa;
            min-height: calc(100vh - 56px);
        }
        .nav-tabs .nav-link {
            color: #007bff;
        }
        .nav-tabs .nav-link.active {
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="top-navbar">
        <div>
            <span th:text="${currentUser != null ? currentUser.email : 'admin@mail.ru'}">admin@mail.ru</span>
            <span> with roles: </span>
            <span th:if="${currentUser != null}">
                <span th:each="role, iterStat : ${currentUser.roles}">
                    <span th:text="${role.name}">ADMIN</span>
                    <span th:if="${!iterStat.last}"> </span>
                </span>
            </span>
            <span th:if="${currentUser == null}">ADMIN USER</span>
        </div>
        <div>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <button type="submit" class="btn btn-dark btn-sm">Logout</button>
            </form>
        </div>
    </div>

    <div class="sidebar">
        <a href="/admin" class="nav-link active" sec:authorize="hasRole('ADMIN')">Admin</a>
        <a href="/user" class="nav-link">User</a>
    </div>

    <div class="main-content">
        <h2>Admin panel</h2>
        
        <ul class="nav nav-tabs mt-4" id="adminTabs" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="users-tab" data-bs-toggle="tab" 
                        data-bs-target="#users" type="button" role="tab">
                    Users table
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="new-user-tab" data-bs-toggle="tab" 
                        data-bs-target="#new-user" type="button" role="tab">
                    New User
                </button>
            </li>
        </ul>

        <div class="tab-content border border-top-0 p-3 bg-white" id="adminTabsContent">
            <div class="tab-pane fade show active" id="users" role="tabpanel">
                <h5>All users</h5>
                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>First Name</th>
                            <th>Last Name</th>
                            <th>Age</th>
                            <th>Email</th>
                            <th>Role</th>
                            <th>Edit</th>
                            <th>Delete</th>
                        </tr>
                    </thead>
                    <tbody>
                    </tbody>
                </table>
            </div>

            <div class="tab-pane fade" id="new-user" role="tabpanel">
                <h5>Add new user</h5>
                <div class="row justify-content-center">
                    <div class="col-md-6">
                        <form th:action="@{/admin}" method="post">
                            <div class="mb-3 text-center">
                                <label class="form-label fw-bold">First name</label>
                                <input type="text" class="form-control" name="firstName" required>
                            </div>
                            
                            <div class="mb-3 text-center">
                                <label class="form-label fw-bold">Last name</label>
                                <input type="text" class="form-control" name="lastName" required>
                            </div>
                            
                            <div class="mb-3 text-center">
                                <label class="form-label fw-bold">Age</label>
                                <input type="number" class="form-control" name="age" required>
                            </div>
                            
                            <div class="mb-3 text-center">
                                <label class="form-label fw-bold">Email</label>
                                <input type="email" class="form-control" name="email" required>
                            </div>
                            
                            <div class="mb-3 text-center">
                                <label class="form-label fw-bold">Password</label>
                                <input type="password" class="form-control" name="password" required>
                            </div>
                            
                            <div class="mb-3 text-center">
                                <label class="form-label fw-bold">Role</label>
                                <select class="form-select" name="roleIds" multiple size="2" required>
                                    <option th:each="role : ${allRoles}" 
                                            th:value="${role.id}" 
                                            th:text="${role.name}">
                                        ADMIN
                                    </option>
                                </select>
                            </div>
                            
                            <div class="text-center">
                                <button type="submit" class="btn btn-success">Add new user</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        let allRoles = [];
        
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Page loaded, fetching data...');
            loadRoles();
            loadUsers();
            setupNewUserForm();
        });
        
        function loadRoles() {
            console.log('Loading roles...');
            fetch('/api/roles')
                .then(response => {
                    console.log('Roles response:', response);
                    return response.json();
                })
                .then(roles => {
                    console.log('Roles loaded:', roles);
                    allRoles = roles;
                })
                .catch(error => console.error('Error loading roles:', error));
        }
        
        function loadUsers() {
            console.log('Loading users...');
            fetch('/api/admin/users')
                .then(response => {
                    console.log('Users response:', response);
                    return response.json();
                })
                .then(users => {
                    console.log('Users loaded:', users);
                    renderUsersTable(users);
                })
                .catch(error => console.error('Error loading users:', error));
        }
        
        function renderUsersTable(users) {
            const tbody = document.querySelector('#users tbody');
            tbody.innerHTML = '';
            
            users.forEach(user => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${user.id}</td>
                    <td>${user.firstName || ''}</td>
                    <td>${user.lastName || ''}</td>
                    <td>${user.age || ''}</td>
                    <td>${user.email || ''}</td>
                    <td>${user.roles.map(r => r.name).join(' ')}</td>
                    <td>
                        <button class="btn btn-info btn-sm text-white" onclick="openEditModal(${user.id})">
                            Edit
                        </button>
                    </td>
                    <td>
                        <button class="btn btn-danger btn-sm" onclick="openDeleteModal(${user.id})">
                            Delete
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }
        
        function openEditModal(userId) {
            fetch(`/api/admin/users/${userId}`)
                .then(response => response.json())
                .then(user => {
                    showEditModal(user);
                })
                .catch(error => console.error('Error loading user:', error));
        }
        
        function showEditModal(user) {
            const modalHtml = `
                <div class="modal fade" id="editModal" tabindex="-1">
                    <div class="modal-dialog">
                        <div class="modal-content">
                            <div class="modal-header">
                                <h5 class="modal-title">Edit user</h5>
                                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                            </div>
                            <form id="editForm" onsubmit="updateUser(event, ${user.id})">
                                <div class="modal-body">
                                    <div class="mb-3 text-center">
                                        <label class="form-label fw-bold">ID</label>
                                        <input type="text" class="form-control" value="${user.id}" readonly>
                                    </div>
                                    <div class="mb-3 text-center">
                                        <label class="form-label fw-bold">First name</label>
                                        <input type="text" class="form-control" name="firstName" value="${user.firstName || ''}" required>
                                    </div>
                                    <div class="mb-3 text-center">
                                        <label class="form-label fw-bold">Last name</label>
                                        <input type="text" class="form-control" name="lastName" value="${user.lastName || ''}" required>
                                    </div>
                                    <div class="mb-3 text-center">
                                        <label class="form-label fw-bold">Age</label>
                                        <input type="number" class="form-control" name="age" value="${user.age || ''}" required>
                                    </div>
                                    <div class="mb-3 text-center">
                                        <label class="form-label fw-bold">Email</label>
                                        <input type="email" class="form-control" name="email" value="${user.email || ''}" required>
                                    </div>
                                    <div class="mb-3 text-center">
                                        <label class="form-label fw-bold">Password</label>
                                        <input type="password" class="form-control" name="password" placeholder="Leave blank to keep current">
                                    </div>
                                    <div class="mb-3 text-center">
                                        <label class="form-label fw-bold">Role</label>
                                        <select class="form-select" name="roleIds" multiple size="2" required>
                                            ${allRoles.map(role => `
                                                <option value="${role.id}" ${user.roles.some(r => r.id === role.id) ? 'selected' : ''}>
                                                    ${role.name}
                                                </option>
                                            `).join('')}
                                        </select>
                                    </div>
                                </div>
                                <div class="modal-footer">
                                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                                    <button type="submit" class="btn btn-primary">Edit</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            `;
            
            const oldModal = document.getElementById('editModal');
            if (oldModal) oldModal.remove();
            
            document.body.insertAdjacentHTML('beforeend', modalHtml);
            const modal = new bootstrap.Modal(document.getElementById('editModal'));
            modal.show();
        }
        
        function updateUser(event, userId) {
            event.preventDefault();
            const form = event.target;
            const formData = new FormData(form);
            
            const userData = {
                firstName: formData.get('firstName'),
                lastName: formData.get('lastName'),
                age: parseInt(formData.get('age')),
                email: formData.get('email'),
                password: formData.get('password'),
                roleIds: Array.from(form.querySelector('[name="roleIds"]').selectedOptions).map(o => parseInt(o.value))
            };
            
            fetch(`/api/admin/users/${userId}`, {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(userData)
            })
            .then(response => response.json())
            .then(() => {
                bootstrap.Modal.getInstance(document.getElementById('editModal')).hide();
                loadUsers();
            })
            .catch(error => console.error('Error updating user:', error));
        }
        
        function openDeleteModal(userId) {
            fetch(`/api/admin/users/${userId}`)
                .then(response => response.json())
                .then(user => {
                    showDeleteModal(user);
                })
                .catch(error => console.error('Error loading user:', error));
        }
        
        function showDeleteModal(user) {
            const modalHtml = `
                <div class="modal fade" id="deleteModal" tabindex="-1">
                    <div class="modal-dialog">
                        <div class="modal-content">
                            <div class="modal-header">
                                <h5 class="modal-title">Delete user</h5>
                                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                            </div>
                            <div class="modal-body">
                                <div class="mb-3 text-center">
                                    <label class="form-label fw-bold">ID</label>
                                    <input type="text" class="form-control" value="${user.id}" readonly>
                                </div>
                                <div class="mb-3 text-center">
                                    <label class="form-label fw-bold">First name</label>
                                    <input type="text" class="form-control" value="${user.firstName || ''}" readonly>
                                </div>
                                <div class="mb-3 text-center">
                                    <label class="form-label fw-bold">Last name</label>
                                    <input type="text" class="form-control" value="${user.lastName || ''}" readonly>
                                </div>
                                <div class="mb-3 text-center">
                                    <label class="form-label fw-bold">Age</label>
                                    <input type="text" class="form-control" value="${user.age || ''}" readonly>
                                </div>
                                <div class="mb-3 text-center">
                                    <label class="form-label fw-bold">Email</label>
                                    <input type="text" class="form-control" value="${user.email || ''}" readonly>
                                </div>
                                <div class="mb-3 text-center">
                                    <label class="form-label fw-bold">Role</label>
                                    <select class="form-select" multiple size="2" disabled>
                                        ${user.roles.map(role => `<option selected>${role.name}</option>`).join('')}
                                    </select>
                                </div>
                            </div>
                            <div class="modal-footer">
                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                                <button type="button" class="btn btn-danger" onclick="deleteUser(${user.id})">Delete</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            const oldModal = document.getElementById('deleteModal');
            if (oldModal) oldModal.remove();
            
            document.body.insertAdjacentHTML('beforeend', modalHtml);
            const modal = new bootstrap.Modal(document.getElementById('deleteModal'));
            modal.show();
        }
        
        function deleteUser(userId) {
            fetch(`/api/admin/users/${userId}`, {
                method: 'DELETE'
            })
            .then(() => {
                bootstrap.Modal.getInstance(document.getElementById('deleteModal')).hide();
                loadUsers();
            })
            .catch(error => console.error('Error deleting user:', error));
        }
        
        function setupNewUserForm() {
            const newUserForm = document.querySelector('#new-user form');
            if (newUserForm) {
                newUserForm.addEventListener('submit', function(event) {
                    event.preventDefault();
                    const formData = new FormData(event.target);
                    
                    const userData = {
                        firstName: formData.get('firstName'),
                        lastName: formData.get('lastName'),
                        age: parseInt(formData.get('age')),
                        email: formData.get('email'),
                        password: formData.get('password'),
                        roleIds: Array.from(event.target.querySelector('[name="roleIds"]').selectedOptions).map(o => parseInt(o.value))
                    };
                    
                    console.log('Creating user with data:', userData);
                    
                    fetch('/api/admin/users', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify(userData)
                    })
                    .then(response => {
                        console.log('Create user response:', response);
                        if (!response.ok) {
                            throw new Error('Failed to create user');
                        }
                        return response.json();
                    })
                    .then(() => {
                        event.target.reset();
                        document.getElementById('users-tab').click();
                        loadUsers();
                    })
                    .catch(error => {
                        console.error('Error creating user:', error);
                    });
                });
            }
        }
    </script>
</body>
</html>
